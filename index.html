<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friday Fun // SN Dev Trivia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#12181a;
    --bg-grid: #182022;
    --card:#1d2528;
    --card-hi:#232c2f;
    --border:#324040;
    --border-soft:#293433;
    --text:#e9efec;
    --text-dim:#8fa39c;
    --text-faint:#5c6c68;
    --green:#5fd068;
    --green-dim:#3a7a44;
    --amber:#f2b84b;
    --red:#ef5b5b;
    --font-display:'Space Grotesk', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --font-body:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(95,208,104,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(242,184,75,0.05), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 16px 60px;
  }
  .bg-grid{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(95,208,104,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(95,208,104,0.035) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image: radial-gradient(circle at 50% 20%, black, transparent 75%);
  }
  .wrap{position:relative; z-index:1; width:100%; max-width:760px;}

  header.top{
    display:flex; justify-content:space-between; align-items:flex-end;
    margin-bottom:22px; flex-wrap:wrap; gap:10px;
  }
  .eyebrow{
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:.16em;
    color:var(--green); text-transform:uppercase; display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 0 3px rgba(95,208,104,0.18); display:inline-block;}
  h1{
    font-family:var(--font-display); font-weight:700; font-size:26px; margin:4px 0 0;
    letter-spacing:-.01em;
  }
  .progress-tag{
    font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim);
    border:1px solid var(--border); padding:6px 12px; border-radius:20px;
    background:var(--card);
  }
  .progress-tag b{color:var(--text); font-weight:600;}

  /* TICKET CARD */
  .ticket{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 20px 50px -20px rgba(0,0,0,0.6);
    position:relative;
  }
  .sla-track{height:6px;width:100%;background:var(--border-soft);position:relative;}
  .sla-bar{height:100%;width:100%;background:var(--green);transition:width 1s linear, background-color .4s ease;}
  .ticket-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 22px 0;
  }
  .ticket-id{
    font-family:var(--font-mono); font-size:13px; color:var(--green); font-weight:600; letter-spacing:.02em;
  }
  .badge{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    padding:4px 10px; border-radius:6px; border:1px solid var(--border);
    color:var(--text-dim);
  }
  .badge.hard{color:var(--red); border-color:rgba(239,91,91,.35); background:rgba(239,91,91,.08);}
  .badge.medium{color:var(--amber); border-color:rgba(242,184,75,.35); background:rgba(242,184,75,.08);}
  .badge.easy{color:var(--green); border-color:rgba(95,208,104,.35); background:rgba(95,208,104,.08);}

  .timer-row{
    display:flex; align-items:center; justify-content:center;
    padding:22px 22px 6px;
  }
  .timer-num{
    font-family:var(--font-mono); font-weight:700; font-size:56px; color:var(--text);
    letter-spacing:-.02em; line-height:1;
    font-variant-numeric: tabular-nums;
  }
  .timer-num.warn{color:var(--amber);}
  .timer-num.crit{color:var(--red);}
  .timer-unit{font-family:var(--font-mono); font-size:13px; color:var(--text-faint); margin-left:6px;}

  .q-body{padding:6px 26px 8px;}
  .q-text{
    font-family:var(--font-display); font-weight:600; font-size:21px; line-height:1.4;
    text-align:center; margin:6px 0 26px;
  }

  .options{
    display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 22px 24px;
  }
  @media (max-width:560px){ .options{grid-template-columns:1fr;} }
  .opt{
    display:flex; align-items:flex-start; gap:10px;
    background:var(--card-hi); border:1px solid var(--border);
    border-radius:10px; padding:13px 14px; cursor:pointer;
    transition:border-color .15s ease, transform .1s ease, background .15s ease;
    font-size:14.5px; line-height:1.4;
  }
  .opt:hover{border-color:var(--green-dim); transform:translateY(-1px);}
  .opt .key{
    font-family:var(--font-mono); font-weight:700; font-size:12.5px; color:var(--text-dim);
    border:1px solid var(--border); border-radius:5px; padding:1px 7px; flex:none;
  }
  .opt.correct{border-color:var(--green); background:rgba(95,208,104,0.08);}
  .opt.correct .key{color:var(--green); border-color:var(--green);}
  .opt.wrong{border-color:var(--red); background:rgba(239,91,91,0.07); opacity:.85;}
  .opt.wrong .key{color:var(--red); border-color:var(--red);}
  .opt.disabled{pointer-events:none;}
  .opt.dim{opacity:.45;}

  .controls{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 22px 22px; border-top:1px dashed var(--border-soft); gap:12px; flex-wrap:wrap;
  }
  .status{font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim);}
  .status.ok{color:var(--green);}
  .status.bad{color:var(--red);}
  .btnrow{display:flex; gap:10px;}
  button{
    font-family:var(--font-mono); font-size:13px; font-weight:600; letter-spacing:.03em;
    padding:11px 18px; border-radius:8px; border:1px solid var(--border);
    background:var(--card-hi); color:var(--text); cursor:pointer;
    transition:all .15s ease;
  }
  button:hover{border-color:var(--text-dim);}
  button.primary{background:var(--green); color:#0d130e; border-color:var(--green);}
  button.primary:hover{filter:brightness(1.08);}
  button:disabled{opacity:.4; cursor:not-allowed;}

  .empty, .loading{
    text-align:center; padding:70px 20px; color:var(--text-dim); font-family:var(--font-mono); font-size:14px;
  }
  .empty b, .loading b{color:var(--text);}

  .done-card{text-align:center; padding:50px 30px;}
  .done-card .big{font-family:var(--font-display); font-size:30px; font-weight:700; margin-bottom:8px;}
  .done-card .score{font-family:var(--font-mono); font-size:44px; color:var(--green); margin:14px 0;}
  footer{margin-top:30px; text-align:center; font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="wrap">
  <header class="top">
    <div>
      <div class="eyebrow">Friday Fun // ServiceNow Dev Trivia</div>
      <h1>Question Queue</h1>
    </div>
    <div class="progress-tag" id="progressTag">Loading queue…</div>
  </header>

  <div id="stage">
    <div class="loading">Fetching open tickets<b>…</b></div>
  </div>

  <footer>rendered client-side · answers sync from supabase in real time</footer>
</div>

<script>
/* ====================== CONFIG ====================== */
const SUPABASE_URL = "https://lstmvrrqfrlyxcdboybt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzdG12cnJxZnJseXhjZGJveWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NjY3NDgsImV4cCI6MjA4OTA0Mjc0OH0.-YdYgC30dTnsSshuVIFIkiQkgJyq1_djrkZfjIbMBeg";
/* ====================================================== */

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const stage = document.getElementById('stage');
const progressTag = document.getElementById('progressTag');

let questions = [];
let idx = 0;
let score = 0;
let timerInterval = null;
let timeLeft = 0;
let answered = false;

async function loadQuestions(){
  const { data, error } = await sb
    .from('questions')
    .select('*')
    .eq('is_active', true)
    .order('order_index', { ascending: true });

  if(error){
    stage.innerHTML = `<div class="empty">Couldn't load the queue.<br><b>${escapeHtml(error.message)}</b></div>`;
    return;
  }
  questions = data || [];
  if(questions.length === 0){
    stage.innerHTML = `<div class="empty">No open tickets in the queue yet.<br><b>Add some from the admin page.</b></div>`;
    progressTag.textContent = "0 tickets";
    return;
  }
  progressTag.innerHTML = `Question <b>1</b> / ${questions.length}`;
  renderQuestion();
}

function ticketId(n){
  return 'INC' + String(1000000 + (n+1)).slice(1);
}

function renderQuestion(){
  clearInterval(timerInterval);
  answered = false;
  const q = questions[idx];
  const limit = q.time_limit && q.time_limit > 0 ? q.time_limit : 10;
  timeLeft = limit;

  const opts = [
    { key:'a', label: q.option_a },
    { key:'b', label: q.option_b },
    { key:'c', label: q.option_c },
    { key:'d', label: q.option_d },
  ].filter(o => o.label);

  const diff = (q.difficulty || 'medium').toLowerCase();

  stage.innerHTML = `
    <div class="ticket">
      <div class="sla-track"><div class="sla-bar" id="slaBar"></div></div>
      <div class="ticket-head">
        <div class="ticket-id">${ticketId(idx)}</div>
        <div class="badge ${diff}">${escapeHtml(q.category || 'General')} · ${diff}</div>
      </div>
      <div class="timer-row">
        <div class="timer-num" id="timerNum">${timeLeft}</div>
        <div class="timer-unit">sec / SLA ${limit}s</div>
      </div>
      <div class="q-body">
        <div class="q-text">${escapeHtml(q.question_text)}</div>
      </div>
      <div class="options" id="optionsBox">
        ${opts.map(o => `
          <div class="opt" data-key="${o.key}">
            <span class="key">${o.key.toUpperCase()}</span>
            <span>${escapeHtml(o.label)}</span>
          </div>`).join('')}
      </div>
      <div class="controls">
        <div class="status" id="statusMsg">Awaiting resolution…</div>
        <div class="btnrow">
          <button id="revealBtn">Reveal answer</button>
          <button class="primary" id="nextBtn" disabled>${idx === questions.length-1 ? 'Finish' : 'Next question'}</button>
        </div>
      </div>
    </div>
  `;

  progressTag.innerHTML = `Question <b>${idx+1}</b> / ${questions.length}`;

  document.querySelectorAll('.opt').forEach(el => {
    el.addEventListener('click', () => selectOption(el.dataset.key));
  });
  document.getElementById('revealBtn').addEventListener('click', () => resolveQuestion(null));
  document.getElementById('nextBtn').addEventListener('click', nextQuestion);

  startTimer(limit);
}

function startTimer(limit){
  updateTimerDisplay(limit, limit);
  timerInterval = setInterval(() => {
    timeLeft -= 1;
    updateTimerDisplay(timeLeft, limit);
if(timeLeft <= 0){
  clearInterval(timerInterval);
  if(!answered) timeUp();
}
  }, 1000);
}

function updateTimerDisplay(t, limit){
  const timerNum = document.getElementById('timerNum');
  const slaBar = document.getElementById('slaBar');
  if(!timerNum || !slaBar) return;
  timerNum.textContent = Math.max(t,0);
  const pct = Math.max(t,0) / limit * 100;
  slaBar.style.width = pct + '%';
  timerNum.classList.remove('warn','crit');
  slaBar.style.background = 'var(--green)';
  if(pct <= 50 && pct > 20){
    timerNum.classList.add('warn');
    slaBar.style.background = 'var(--amber)';
  } else if(pct <= 20){
    timerNum.classList.add('crit');
    slaBar.style.background = 'var(--red)';
  }
}

function selectOption(key){
  if(answered) return;
  resolveQuestion(key);
}

function timeUp() {
  answered = true;

  // Disable option clicks
  document.querySelectorAll('.opt').forEach(el => {
    el.classList.add('disabled');
  });

  const statusMsg = document.getElementById('statusMsg');
  statusMsg.textContent = 'Time up! Click "Reveal answer" to see the correct answer.';
  statusMsg.className = 'status bad';

  // Don't allow Next yet
  document.getElementById('nextBtn').disabled = true;

  // Keep Reveal enabled
  document.getElementById('revealBtn').disabled = false;
}

function resolveQuestion(chosenKey){
  const revealOnly = answered && chosenKey === null;
  if(answered && !revealOnly) return;
  answered = true;
  clearInterval(timerInterval);
  const q = questions[idx];
  const correct = (q.correct_option || '').toLowerCase();
  const opts = document.querySelectorAll('.opt');
  const statusMsg = document.getElementById('statusMsg');

  opts.forEach(el => {
    el.classList.add('disabled');
    const k = el.dataset.key;
    if(k === correct){
      el.classList.add('correct');
    } else if(k === chosenKey){
      el.classList.add('wrong');
    } else {
      el.classList.add('dim');
    }
  });
  
  if(chosenKey === null){
  statusMsg.textContent = 'Correct answer revealed.';
  statusMsg.className = 'status';
}else if(chosenKey === correct){
    statusMsg.textContent = 'Resolved correctly.';
    statusMsg.className = 'status ok';
    score += 1;
  } else {
    statusMsg.textContent = 'Incorrect resolution.';
    statusMsg.className = 'status bad';
  }

  document.getElementById('nextBtn').disabled = false;
  document.getElementById('revealBtn').disabled = true;
}

function nextQuestion(){
  if(idx < questions.length - 1){
    idx += 1;
    renderQuestion();
  } else {
    showDone();
  }
}

function showDone(){
  progressTag.innerHTML = `<b>Queue closed</b>`;
  stage.innerHTML = `
    <div class="ticket done-card">
      <div class="eyebrow" style="justify-content:center; margin-bottom:14px;">Queue closed</div>
      <div class="big">All tickets resolved</div>
      <div class="score">${score} / ${questions.length}</div>
      <button class="primary" id="restartBtn">Run it back</button>
    </div>
  `;
  document.getElementById('restartBtn').addEventListener('click', () => {
    idx = 0; score = 0; renderQuestion();
  });
}

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

loadQuestions();
</script>
</body>
</html>
